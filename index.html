<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>i.oneme.ru Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Архив i.oneme.ru/i*</h1>

    <div style="margin-bottom: 10px;">
        <span id="last-update" style="color: #888; font-size: 14px;"></span>
    </div>

    <div style="margin-bottom: 20px;">
        <button id="sort-new">📅 Новые сначала</button>
        <button id="sort-old">📅 Старые сначала</button>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        let allImages = [];

        function parseDate(dateStr) {
            // формат: "09.01.2026 - 10:55"
            const [day, month, year, , hour, minute] = dateStr.split(/[.\s:-]+/);
            return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`).getTime();
        }

        function renderImages(sortedArray) {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            sortedArray.forEach(img => {
                const card = document.createElement("div");
                card.className = "card";

                const previewSrc = img.image; // всегда превью из архива
                const downloadedMark = img.local ? ' <span style="color:#8bc34a;">(загружено)</span>' : '';

                card.innerHTML = `
                    <a href="${img.image}" target="_blank">
                        <img loading="lazy" src="${previewSrc}">
                    </a>
                    <div class="meta">
                        <b>Оригинал:</b><br>
                        <a href="${img.source}" target="_blank">${img.source}</a>
                        <br><br>
                        <b>Дата:</b><br>
                        ${img.date}${downloadedMark}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function sortAndRender(order) {
            const sorted = [...allImages].sort((a, b) => {
                const ta = parseDate(a.date);
                const tb = parseDate(b.date);
                return order === 'new' ? tb - ta : ta - tb;
            });
            renderImages(sorted);
        }

        // Загрузка даты последнего обновления
        fetch("last_update.txt")
            .then(r => r.text())
            .then(text => {
                document.getElementById("last-update").textContent = "Последнее обновление списка: " + text;
            })
            .catch(() => {
                document.getElementById("last-update").textContent = "Последнее обновление списка: неизвестно";
            });

        fetch("images.json")
            .then(r => r.json())
            .then(images => {
                allImages = images;
                document.getElementById("title").textContent = `Архив i.oneme.ru/i* (Всего: ${images.length})`;
                sortAndRender('new');

                document.getElementById("sort-new").addEventListener("click", () => sortAndRender('new'));
                document.getElementById("sort-old").addEventListener("click", () => sortAndRender('old'));
            });
    </script>
</body>
</html>
