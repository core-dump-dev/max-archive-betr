<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>i.oneme.ru Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Архив i.oneme.ru/i*</h1>

    <div style="margin-bottom: 10px;">
        <span id="last-update" style="color: #888; font-size: 14px;"></span>
    </div>

    <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <button id="sort-new" class="sort-btn active">📅 Новые сначала</button>
        <button id="sort-old" class="sort-btn">📅 Старые сначала</button>

        <div style="flex:1; display: flex; justify-content: flex-end; gap: 8px;">
            <input type="text" id="search-input" placeholder="Поиск по r (мин. 3 символа)" style="padding: 8px 12px; border-radius: 20px; border: none; background: #2a2a30; color: white; width: 250px;">
            <button id="search-btn">🔍 Найти</button>
            <button id="clear-search-btn" style="display: none;">✖ Сброс</button>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <div class="grid" id="grid"></div>
    <div id="no-results" style="text-align: center; padding: 40px; color: #888; display: none;">Ничего не найдено</div>

    <div style="margin-top: 30px; text-align: center;" id="pagination-bottom"></div>

    <script>
        let allImages = [];
        let filteredImages = [];
        let currentPage = 1;
        const pageSize = 20;
        let currentSort = 'new'; // 'new' или 'old'
        let searchQuery = '';

        function parseDate(dateStr) {
            try {
                const [datePart, timePart] = dateStr.split(' - ');
                const [day, month, year] = datePart.split('.');
                const [hour, minute] = timePart.split(':');
                return new Date(year, month - 1, day, hour, minute).getTime();
            } catch (e) {
                console.warn('Ошибка парсинга даты:', dateStr);
                return 0;
            }
        }

        function filterAndSortImages() {
            let filtered = allImages;
            if (searchQuery.length >= 3) {
                const q = searchQuery.toLowerCase();
                filtered = allImages.filter(img => img.source.toLowerCase().includes(q));
            }

            // сортировка
            filtered = [...filtered].sort((a, b) => {
                const ta = parseDate(a.date);
                const tb = parseDate(b.date);
                return currentSort === 'new' ? tb - ta : ta - tb;
            });

            filteredImages = filtered;
            return filtered;
        }

        function renderPage() {
            const sortedFiltered = filterAndSortImages();
            const totalPages = Math.ceil(sortedFiltered.length / pageSize);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * pageSize;
            const pageImages = sortedFiltered.slice(start, start + pageSize);

            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            if (pageImages.length === 0) {
                document.getElementById("no-results").style.display = 'block';
            } else {
                document.getElementById("no-results").style.display = 'none';
            }

            pageImages.forEach(img => {
                const card = document.createElement("div");
                card.className = "card";

                const previewSrc = img.image;
                const downloadedMark = img.local ? ' <span style="color:#8bc34a;">(загружено)</span>' : '';

                card.innerHTML = `
                    <a href="${img.image}" target="_blank">
                        <img loading="lazy" src="${previewSrc}">
                    </a>
                    <div class="meta">
                        <b>Оригинал:</b><br>
                        <a href="${img.source}" target="_blank">${img.source}</a>
                        <br><br>
                        <b>Дата:</b><br>
                        ${img.date}${downloadedMark}
                    </div>
                `;
                grid.appendChild(card);
            });

            updatePaginationControls(totalPages);
            updateActiveSortButton();
            updateClearButton();
        }

        function updatePaginationControls(totalPages) {
            const paginationDivs = document.querySelectorAll('#pagination, #pagination-bottom');
            paginationDivs.forEach(container => {
                container.innerHTML = '';

                if (totalPages <= 1) return;

                const prevBtn = document.createElement('button');
                prevBtn.textContent = '←';
                prevBtn.disabled = currentPage === 1;
                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        renderPage();
                    }
                });

                const pageInfo = document.createElement('span');
                pageInfo.style.margin = '0 10px';
                pageInfo.textContent = `Страница ${currentPage} из ${totalPages}`;

                const nextBtn = document.createElement('button');
                nextBtn.textContent = '→';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.addEventListener('click', () => {
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderPage();
                    }
                });

                container.appendChild(prevBtn);
                container.appendChild(pageInfo);
                container.appendChild(nextBtn);
            });
        }

        function updateActiveSortButton() {
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            if (currentSort === 'new') {
                document.getElementById('sort-new').classList.add('active');
            } else {
                document.getElementById('sort-old').classList.add('active');
            }
        }

        function updateClearButton() {
            const clearBtn = document.getElementById('clear-search-btn');
            if (searchQuery.length >= 3) {
                clearBtn.style.display = 'inline-block';
            } else {
                clearBtn.style.display = 'none';
            }
        }

        function performSearch() {
            const input = document.getElementById('search-input');
            const query = input.value.trim();
            if (query.length === 0 || query.length < 3) {
                searchQuery = '';
            } else {
                searchQuery = query;
            }
            currentPage = 1;
            renderPage();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            currentPage = 1;
            renderPage();
        }

        // Загрузка даты последнего обновления
        fetch("last_update.txt")
            .then(r => r.text())
            .then(text => {
                document.getElementById("last-update").textContent = "Последнее обновление списка: " + text;
            })
            .catch(() => {
                document.getElementById("last-update").textContent = "Последнее обновление списка: неизвестно";
            });

        fetch("images.json")
            .then(r => r.json())
            .then(images => {
                allImages = images;
                document.getElementById("title").textContent = `Архив i.oneme.ru/i* (Всего: ${images.length})`;
                renderPage();

                document.getElementById("sort-new").addEventListener("click", () => {
                    currentSort = 'new';
                    currentPage = 1;
                    renderPage();
                });
                document.getElementById("sort-old").addEventListener("click", () => {
                    currentSort = 'old';
                    currentPage = 1;
                    renderPage();
                });

                document.getElementById("search-btn").addEventListener("click", performSearch);
                document.getElementById("search-input").addEventListener("keypress", (e) => {
                    if (e.key === 'Enter') performSearch();
                });
                document.getElementById("clear-search-btn").addEventListener("click", clearSearch);
            });
    </script>
</body>
</html>
